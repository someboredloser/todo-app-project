services:
  db:
    image: postgres:15
    container_name: task-manager
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: postgres
    ports:
      - "45432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    container_name: task-manager-api
    restart: always
    depends_on:
      - db
    ports:
      - "8080:8000"
    env_file:
      - .env

volumes:
  pgdata: